<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank C2 — Login</title>
<style>
:root {
  --bg:#0a0e1a; --panel:#111827; --border:#1f2937;
  --accent:#00e676; --text:#e2e8f0; --muted:#64748b; --danger:#ff1744;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
  background:var(--bg); color:var(--text);
  font-family:'Courier New',monospace;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
}
.card {
  background:var(--panel); border:1px solid var(--border);
  border-radius:8px; padding:2rem; width:100%; max-width:340px;
}
h1 {
  font-size:1rem; letter-spacing:.15em; text-transform:uppercase;
  color:var(--accent); margin-bottom:1.5rem; text-align:center;
}
label { display:block; font-size:.75rem; color:var(--muted); margin-bottom:.4rem; letter-spacing:.1em; }
input[type=password] {
  width:100%; background:#0a0e1a; border:1px solid var(--border);
  color:var(--text); padding:.6rem .8rem; border-radius:4px;
  font-family:inherit; font-size:.95rem; margin-bottom:1.2rem;
  outline:none;
}
input[type=password]:focus { border-color:var(--accent); }
button {
  width:100%; background:var(--accent); color:#0a0e1a;
  border:none; padding:.65rem; border-radius:4px;
  font-family:inherit; font-size:.9rem; font-weight:700;
  letter-spacing:.1em; cursor:pointer; text-transform:uppercase;
}
button:hover { opacity:.9; }
.err {
  background:#2d0a0a; border:1px solid var(--danger);
  color:var(--danger); border-radius:4px;
  padding:.5rem .8rem; font-size:.8rem;
  margin-bottom:1rem; text-align:center;
}
</style>
</head>
<body>
<div class="card">
  <h1>▸ Tank C2</h1>
  <form method="POST" action="/login">
    <script>if(location.search.includes('err=1'))document.write('<div class="err">Incorrect password</div>')</script>
    <label for="pwd">Password</label>
    <input type="password" id="pwd" name="password" autofocus autocomplete="current-password">
    <button type="submit">Authenticate</button>
  </form>
</div>
</body>
</html>
